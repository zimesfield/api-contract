CreateAnnouncementRequest:
  type: object
  required:
    - title
    - content
    - category
    - priority
  properties:
    title:
      type: string
      minLength: 1
      maxLength: 255
      description: Announcement title
      example: "System Maintenance Notice"
    content:
      type: string
      minLength: 1
      maxLength: 5000
      description: Announcement content
      example: "The system will undergo maintenance on Sunday"
    description:
      type: string
      maxLength: 500
      description: Brief description of the announcement
      example: "System will be unavailable for 4 hours"
    category:
      type: string
      description: Announcement category
      example: "System"
    priority:
      type: integer
      minimum: 0
      maximum: 10
      description: Priority level (0-10)
      example: 8

UpdateAnnouncementRequest:
  type: object
  properties:
    title:
      type: string
      minLength: 1
      maxLength: 255
      description: Updated announcement title
    content:
      type: string
      minLength: 1
      maxLength: 5000
      description: Updated announcement content
    description:
      type: string
      maxLength: 500
      description: Updated description

PublishAnnouncementRequest:
  type: object
  required:
    - expiryDate
  properties:
    expiryDate:
      type: string
      format: date-time
      description: When the announcement should expire
      example: "2026-05-18T13:46:37+01:00"

AnnouncementResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
      description: Announcement ID
    tenantId:
      type: string
      description: Tenant ID
    creatorId:
      type: string
      format: uuid
      description: User ID of the creator
    title:
      type: string
      description: Announcement title
    content:
      type: string
      description: Announcement content
    description:
      type: string
      description: Announcement description
    status:
      $ref: '#/AnnouncementStatus'
    category:
      type: string
      description: Announcement category
    priority:
      type: integer
      description: Priority level (0-10)
    pinned:
      type: boolean
      description: Whether the announcement is pinned
    tags:
      type: string
      description: Comma-separated tags
    publishDate:
      type: string
      format: date-time
      description: When the announcement was published
    publishedDate:
      type: string
      format: date-time
      description: Published timestamp
    expiryDate:
      type: string
      format: date-time
      description: When the announcement expires
    scheduledDate:
      type: string
      format: date-time
      description: Scheduled publication date
    archivedDate:
      type: string
      format: date-time
      description: When the announcement was archived
    createdAt:
      type: string
      format: date-time
      description: Creation timestamp
    lastModifiedAt:
      type: string
      format: date-time
      description: Last modification timestamp

PagedAnnouncementResponse:
  type: object
  properties:
    type: object
    properties:
      content:
        type: array
        items:
          $ref: '#/AnnouncementResponse'
      pageable:
        $ref: '#/PageMetadata'



AnnouncementStatus:
  type: string
  enum: [DRAFT, SCHEDULED, PUBLISHED, ARCHIVED]
  description: Current status of the announcement

PageMetadata:
  type: object
  properties:
    pageNumber:
      type: integer
      description: Current page number
    pageSize:
      type: integer
      description: Size of the page
    totalElements:
      type: integer
      description: Total number of elements
    totalPages:
      type: integer
      description: Total number of pages

ErrorResponse:
  type: object
  properties:
    timestamp:
      type: string
      format: date-time
      description: Error timestamp
    status:
      type: integer
      description: HTTP status code
    error:
      type: string
      description: Error type
    message:
      type: string
      description: Error message
    path:
      type: string
      description: Request path

