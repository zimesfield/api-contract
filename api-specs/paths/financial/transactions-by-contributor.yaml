get:
  summary: Get financial transactions by contributor
  tags: [Financial]
  operationId: getTransactionsByContributor
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: contributorId
      in: path
      description: Contributor ID
      required: true
      schema:
        type: string
        format: uuid
    - name: page
      in: query
      description: Page number (0-indexed)
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    - name: size
      in: query
      description: Page size
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    - name: startDate
      in: query
      description: Start date filter (ISO 8601)
      required: false
      schema:
        type: string
        format: date
    - name: endDate
      in: query
      description: End date filter (ISO 8601)
      required: false
      schema:
        type: string
        format: date
    - name: status
      in: query
      description: Transaction status filter
      required: false
      schema:
        type: string
        enum: [PENDING, VERIFIED, REVERSED, CANCELLED]
  responses:
    '200':
      description: Financial transactions retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              content:
                type: array
                items:
                  $ref: '../../common/components/financial/schema.yaml#/FinancialTransactionResponse'
              pageable:
                $ref: '../../common/components/financial/schema.yaml#/PageMetadata'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []
