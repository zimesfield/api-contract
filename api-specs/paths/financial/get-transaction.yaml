get:
  summary: Get financial transaction by ID
  tags: [Financial]
  operationId: getTransaction
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: transactionId
      in: path
      description: Transaction ID
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Financial transaction retrieved successfully
      content:
        application/json:
          schema:
            $ref: '../../common/components/financial/schema.yaml#/FinancialTransactionResponse'
    '404':
      description: Transaction not found
      content:
        application/json:
          schema:
            $ref: '../../common/components/financial/schema.yaml#/ErrorResponse'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []
