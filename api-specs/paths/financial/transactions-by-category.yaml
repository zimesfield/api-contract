get:
  summary: Get financial transactions by category
  tags: [Financial]
  operationId: getTransactionsByCategory
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: category
      in: path
      description: Transaction category
      required: true
      schema:
        type: string
    - name: page
      in: query
      description: Page number (0-indexed)
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    - name: size
      in: query
      description: Page size
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    - name: startDate
      in: query
      description: Start date filter (ISO 8601)
      required: false
      schema:
        type: string
        format: date
    - name: endDate
      in: query
      description: End date filter (ISO 8601)
      required: false
      schema:
        type: string
        format: date
  responses:
    '200':
      description: Financial transactions retrieved successfully
      content:
        application/json:
          schema:
            $ref: '../../common/components/financial/schema.yaml#/PagedFinancialTransactionResponse'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []
