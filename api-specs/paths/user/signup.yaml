post:
  tags: [Register]
  summary: Tenant Registration
  operationId: signupUser
  requestBody:
    description: signup user to tenant
    content:
      application/json:
        schema:
          $ref: '../../common/components/user/schema.yaml#/SignupRequest'
    required: true
  responses:
    200:
      description: successful operation
      content:
        application/json:
          schema:
            $ref: '../../common/components/user/schema.yaml#/SignupResponse'
    400:
      description: Invalid information supplied
      content:
        application/problem+json:
          schema:
            $ref: '../../common/components/schemas.yaml#/components/schemas/Problem'
    404:
      description: Resources Not Found
      content:
        application/problem+json:
          schema:
            $ref: '../../common/components/schemas.yaml#/components/schemas/Problem'

  security:
    - oauth2: []