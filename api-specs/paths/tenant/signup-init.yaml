post:
  tags: [Register]
  summary: Tenant Registration
  operationId: signupUser
  requestBody:
    description: signup user to tenant
    content:
      application/json:
        schema:
          $ref: '../../common/components/user/schema.yaml#/SignupRequest'
    required: true
  responses:
    200:
      description: successful operation
      content:
        application/json:
          schema:
            $ref: '../../common/components/user/schema.yaml#/SignupResponse'
    '400':
      $ref: '../../common/components/responses.yaml#/BadRequest'
    '401':
      $ref: '../../common/components/responses.yaml#/Unauthorized'
    '403':
      $ref: '../../common/components/responses.yaml#/Forbidden'
    '404':
      $ref: '../../common/components/responses.yaml#/NotFound'
    '409':
      $ref: '../../common/components/responses.yaml#/Conflict'
    '422':
      $ref: '../../common/components/responses.yaml#/UnprocessableEntity'

  security:
    - oauth2: []