post:
  tags: [Register]
  summary: Complete Tenant Sign up
  description: Complete tenant sign up with user information
  operationId: finishSignup
  requestBody:
    description: finish user sign up for tenant
    content:
      application/json:
        schema:
          $ref: '../../common/components/user/schema.yaml#/FinishSignupRequest'
    required: true
  responses:
    '201':
      description: Tenant signup completed successfully
      content:
        application/json:
          schema:
            $ref: '../../common/components/user/schema.yaml#/UserResponse'
    '400':
      $ref: '../../common/components/responses.yaml#/BadRequest'
    '401':
      $ref: '../../common/components/responses.yaml#/Unauthorized'
    '403':
      $ref: '../../common/components/responses.yaml#/Forbidden'
    '404':
      $ref: '../../common/components/responses.yaml#/NotFound'
    '409':
      $ref: '../../common/components/responses.yaml#/Conflict'
    '422':
      $ref: '../../common/components/responses.yaml#/UnprocessableEntity'
  security:
    - oauth2: []