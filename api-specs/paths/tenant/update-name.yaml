
put:
  summary: Update tenant name
  tags: [Tenant]
  operationId: updateName
  parameters:
    - $ref: '../../common/components/schemas.yaml#/components/parameters/TenantHeader'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../common/components/tenant/schema.yaml#/UpdateTenantNameRequest'
  responses:
    '202':
      description: Successfully updated Tenant information
      content:
        application/json:
          schema:
            $ref: '../../common/components/tenant/schema.yaml#/Tenant'
    '422':
      $ref: '../../common/components/schemas.yaml#/components/schemas/Problem'
    '400':
      $ref: '../../common/components/responses.yaml#/BadRequest'
    '401':
      $ref: '../../common/components/responses.yaml#/Unauthorized'
    '403':
      $ref: '../../common/components/responses.yaml#/Forbidden'

  security:
    - oauth2: [ admins ]