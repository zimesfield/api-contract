get:
  summary: Get published announcements for tenant
  tags: [Announcements]
  operationId: getPublishedAnnouncements
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: page
      in: query
      description: Page number (0-indexed)
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    - name: size
      in: query
      description: Page size
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
  responses:
    '200':
      description: Published announcements retrieved successfully
      content:
        application/json:
          schema:
            $ref: '../../common/components/announcement/schema.yaml#/PagedAnnouncementResponse'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []

