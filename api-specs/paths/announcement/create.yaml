post:
  summary: Create a new announcement in draft status
  tags: [Announcements]
  operationId: createAnnouncement
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../common/components/announcement/schema.yaml#/CreateAnnouncementRequest'
  responses:
    '201':
      description: Announcement created successfully
      content:
        application/json:
          schema:
            $ref: '../../common/components/announcement/schema.yaml#/AnnouncementResponse'
    '400':
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '../../common/components/announcement/schema.yaml#/ErrorResponse'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '500':
      description: Internal server error

  security:
    - oauth2: []
