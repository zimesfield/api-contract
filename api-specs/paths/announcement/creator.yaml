get:
  summary: Get announcements created by user
  tags: [Announcements]
  operationId: getAnnouncementsByCreator
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: creatorId
      in: path
      description: Creator user ID
      required: true
      schema:
        type: string
        format: uuid
    - name: page
      in: query
      description: Page number (0-indexed)
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    - name: size
      in: query
      description: Page size
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
  responses:
    '200':
      description: Announcements by creator retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              content:
                type: array
                items:
                  $ref: '../../common/components/announcement/schema.yaml#/AnnouncementResponse'
              pageable:
                $ref: '../../common/components/announcement/schema.yaml#/PageMetadata'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []

