get:
  summary: Get attendance record by ID
  tags: [Attendance]
  operationId: getAttendance
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: attendanceId
      in: path
      description: Attendance record ID
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Attendance record retrieved successfully
      content:
        application/json:
          schema:
            $ref: '../../common/components/attendance/schema.yaml#/AttendanceResponse'
    '404':
      description: Attendance record not found
      content:
        application/json:
          schema:
            $ref: '../../common/components/attendance/schema.yaml#/ErrorResponse'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []

put:
  summary: Update attendance status
  tags: [Attendance]
  operationId: updateAttendanceStatus
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: attendanceId
      in: path
      description: Attendance record ID
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../common/components/attendance/schema.yaml#/UpdateAttendanceStatusRequest'
  responses:
    '200':
      description: Attendance status updated successfully
      content:
        application/json:
          schema:
            $ref: '../../common/components/attendance/schema.yaml#/AttendanceResponse'
    '400':
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '../../common/components/attendance/schema.yaml#/ErrorResponse'
    '404':
      description: Attendance record not found
      content:
        application/json:
          schema:
            $ref: '../../common/components/attendance/schema.yaml#/ErrorResponse'
    '409':
      description: Cannot update attendance status in its current state
      content:
        application/json:
          schema:
            $ref: '../../common/components/attendance/schema.yaml#/ErrorResponse'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []
