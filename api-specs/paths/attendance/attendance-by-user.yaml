get:
  summary: Get attendance records for a user
  tags: [Attendance]
  operationId: getAttendanceByUser
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: userId
      in: path
      description: User ID
      required: true
      schema:
        type: string
        format: uuid
    - name: page
      in: query
      description: Page number (0-indexed)
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    - name: size
      in: query
      description: Page size
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    - name: startDate
      in: query
      description: Start date filter (ISO 8601)
      required: false
      schema:
        type: string
        format: date
    - name: endDate
      in: query
      description: End date filter (ISO 8601)
      required: false
      schema:
        type: string
        format: date
  responses:
    '200':
      description: Attendance records retrieved successfully
      content:
        application/json:
          schema:
            $ref: '../../common/components/attendance/schema.yaml#/PagedAttendanceResponse'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []
