get:
  summary: Get attendance records by status
  tags: [Attendance]
  operationId: getAttendanceByStatus
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: status
      in: path
      description: Attendance status
      required: true
      schema:
        type: string
        enum: [PRESENT, ABSENT, LATE, EXCUSED]
    - name: page
      in: query
      description: Page number (0-indexed)
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    - name: size
      in: query
      description: Page size
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    - name: date
      in: query
      description: Date filter (ISO 8601)
      required: false
      schema:
        type: string
        format: date
  responses:
    '200':
      description: Attendance records retrieved successfully
      content:
        application/json:
          schema:
            $ref: '../../common/components/attendance/schema.yaml#/PagedAttendanceResponse'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []
