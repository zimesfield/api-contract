post:
  summary: Check in a user
  tags: [Attendance]
  operationId: checkIn
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../common/components/attendance/schema.yaml#/CheckInRequest'
  responses:
    '201':
      description: User checked in successfully
      content:
        application/json:
          schema:
            $ref: '../../common/components/attendance/schema.yaml#/AttendanceResponse'
    '400':
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '../../common/components/attendance/schema.yaml#/ErrorResponse'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '409':
      description: User already checked in
      content:
        application/json:
          schema:
            $ref: '../../common/components/attendance/schema.yaml#/ErrorResponse'
    '500':
      description: Internal server error

  security:
    - oauth2: []
