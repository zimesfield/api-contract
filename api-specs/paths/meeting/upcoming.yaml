get:
  summary: Get upcoming meetings for user
  tags: [Meetings]
  operationId: getUpcomingMeetings
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: days
      in: query
      description: Number of days to look ahead
      required: false
      schema:
        type: integer
        default: 7
        minimum: 1
    - name: page
      in: query
      description: Page number (0-indexed)
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    - name: size
      in: query
      description: Page size
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
  responses:
    '200':
      description: Upcoming meetings retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              content:
                type: array
                items:
                  $ref: '../../common/components/meeting/schema.yaml#/MeetingResponse'
              pageable:
                $ref: '../../common/components/meeting/schema.yaml#/PageMetadata'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []
