post:
  summary: Create meeting reminder
  tags: [Meetings]
  operationId: createReminder
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: meetingId
      in: path
      description: Meeting ID
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../common/components/meeting/schema.yaml#/CreateReminderRequest'
  responses:
    '201':
      description: Reminder created successfully
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/ReminderResponse'
    '400':
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/ErrorResponse'
    '404':
      description: Meeting not found
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/ErrorResponse'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

get:
  summary: Get meeting reminders
  tags: [Meetings]
  operationId: getMeetingReminders
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: meetingId
      in: path
      description: Meeting ID
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Reminders retrieved successfully
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../common/components/meeting/schema.yaml#/ReminderResponse'
    '404':
      description: Meeting not found
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/ErrorResponse'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []
