post:
  summary: End a meeting (transition to COMPLETED)
  tags: [Meetings]
  operationId: endMeeting
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: meetingId
      in: path
      description: Meeting ID
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: '../../common/components/meeting/schema.yaml#/EndMeetingRequest'
  responses:
    '200':
      description: Meeting ended successfully
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/MeetingResponse'
    '404':
      description: Meeting not found
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/ErrorResponse'
    '409':
      description: Cannot end meeting in its current status
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/ErrorResponse'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []
