get:
  summary: Get meetings organized by user
  tags: [Meetings]
  operationId: getMeetingsByOrganizer
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: organizerId
      in: path
      description: Organizer user ID
      required: true
      schema:
        type: string
        format: uuid
    - name: page
      in: query
      description: Page number (0-indexed)
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    - name: size
      in: query
      description: Page size
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    - name: status
      in: query
      description: Filter by meeting status
      required: false
      schema:
        type: string
        enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED]
  responses:
    '200':
      description: Meetings retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              content:
                type: array
                items:
                  $ref: '../../common/components/meeting/schema.yaml#/MeetingResponse'
              pageable:
                $ref: '../../common/components/meeting/schema.yaml#/PageMetadata'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []
