get:
  summary: Get meeting participants
  tags: [Meetings]
  operationId: getMeetingParticipants
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: meetingId
      in: path
      description: Meeting ID
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Meeting participants retrieved successfully
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../common/components/meeting/schema.yaml#/ParticipantResponse'
    '404':
      description: Meeting not found
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/ErrorResponse'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

post:
  summary: Add participant to meeting
  tags: [Meetings]
  operationId: addParticipant
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: meetingId
      in: path
      description: Meeting ID
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../common/components/meeting/schema.yaml#/AddParticipantRequest'
  responses:
    '201':
      description: Participant added successfully
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/ParticipantResponse'
    '400':
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/ErrorResponse'
    '404':
      description: Meeting not found
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/ErrorResponse'
    '409':
      description: Participant already exists
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/ErrorResponse'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []
