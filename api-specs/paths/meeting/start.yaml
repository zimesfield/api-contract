post:
  summary: Start a meeting (transition to IN_PROGRESS)
  tags: [Meetings]
  operationId: startMeeting
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: meetingId
      in: path
      description: Meeting ID
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Meeting started successfully
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/MeetingResponse'
    '404':
      description: Meeting not found
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/ErrorResponse'
    '409':
      description: Cannot start meeting in its current status
      content:
        application/json:
          schema:
            $ref: '../../common/components/meeting/schema.yaml#/ErrorResponse'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error

  security:
    - oauth2: []
