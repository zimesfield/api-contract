get:
  summary: Get all meetings for tenant
  tags: [Meetings]
  operationId: getAllMeetings
  parameters:
    - name: X-Tenant-ID
      in: header
      description: Tenant ID
      required: true
      schema:
        type: string
    - name: page
      in: query
      description: Page number (0-indexed)
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    - name: size
      in: query
      description: Page size
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    - name: status
      in: query
      description: Filter by meeting status
      required: false
      schema:
        type: string
        enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED]
  responses:
    '200':
      description: Meetings retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              content:
                type: array
                items:
                  $ref: '#/components/schemas/MeetingResponse'
              pageable:
                $ref: '#/components/schemas/PageMetadata'
    '401':
      description: Unauthorized
    '500':
      description: Internal server error
