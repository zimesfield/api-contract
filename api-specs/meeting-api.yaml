openapi: 3.0.3
info:
  title: Meeting API
  description: REST API for managing meetings in the Zimesfield platform
  version: 1.0.0
  contact:
    name: Zimesfield Team
servers:
  - url: 'http://localhost:8083/api'
    description: Local development server
  - url: 'https://api.zimesfield.com/api'
    description: Production server

tags:
  - name: Meetings
    description: Meeting management operations
  - name: Meeting Participants
    description: Meeting participant management
  - name: Meeting Reminders
    description: Meeting reminder operations

paths:
  /meetings:
    post:
      summary: Create a new meeting
      tags: [Meetings]
      operationId: createMeeting
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMeetingRequest'
      responses:
        '201':
          description: Meeting created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Internal server error

    get:
      summary: Get all meetings for tenant
      tags: [Meetings]
      operationId: getAllMeetings
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: Page number (0-indexed)
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: status
          in: query
          description: Filter by meeting status
          required: false
          schema:
            type: string
            enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED]
      responses:
        '200':
          description: Meetings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/MeetingResponse'
                  pageable:
                    $ref: '#/components/schemas/PageMetadata'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /meetings/{meetingId}:
    get:
      summary: Get meeting by ID
      tags: [Meetings]
      operationId: getMeeting
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: meetingId
          in: path
          description: Meeting ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Meeting retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingResponse'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

    put:
      summary: Update meeting details
      tags: [Meetings]
      operationId: updateMeeting
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: meetingId
          in: path
          description: Meeting ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeetingRequest'
      responses:
        '200':
          description: Meeting updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot update meeting in its current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

    delete:
      summary: Delete meeting
      tags: [Meetings]
      operationId: deleteMeeting
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: meetingId
          in: path
          description: Meeting ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Meeting deleted successfully
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /meetings/{meetingId}/start:
    post:
      summary: Start a meeting
      tags: [Meetings]
      operationId: startMeeting
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: meetingId
          in: path
          description: Meeting ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Meeting started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingResponse'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot start meeting in its current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /meetings/{meetingId}/end:
    post:
      summary: End a meeting
      tags: [Meetings]
      operationId: endMeeting
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: meetingId
          in: path
          description: Meeting ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndMeetingRequest'
      responses:
        '200':
          description: Meeting ended successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingResponse'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot end meeting in its current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /meetings/{meetingId}/cancel:
    post:
      summary: Cancel a meeting
      tags: [Meetings]
      operationId: cancelMeeting
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: meetingId
          in: path
          description: Meeting ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelMeetingRequest'
      responses:
        '200':
          description: Meeting cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingResponse'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot cancel meeting in its current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /meetings/{meetingId}/participants:
    get:
      summary: Get meeting participants
      tags: [Meeting Participants]
      operationId: getMeetingParticipants
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: meetingId
          in: path
          description: Meeting ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Meeting participants retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParticipantResponse'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

    post:
      summary: Add participant to meeting
      tags: [Meeting Participants]
      operationId: addParticipant
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: meetingId
          in: path
          description: Meeting ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddParticipantRequest'
      responses:
        '201':
          description: Participant added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Participant already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /meetings/{meetingId}/participants/{participantId}:
    delete:
      summary: Remove participant from meeting
      tags: [Meeting Participants]
      operationId: removeParticipant
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: meetingId
          in: path
          description: Meeting ID
          required: true
          schema:
            type: string
            format: uuid
        - name: participantId
          in: path
          description: Participant ID (User ID)
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Participant removed successfully
        '404':
          description: Meeting or participant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

    put:
      summary: Update participant status
      tags: [Meeting Participants]
      operationId: updateParticipantStatus
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: meetingId
          in: path
          description: Meeting ID
          required: true
          schema:
            type: string
            format: uuid
        - name: participantId
          in: path
          description: Participant ID (User ID)
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateParticipantStatusRequest'
      responses:
        '200':
          description: Participant status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Meeting or participant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /meetings/organizer/{organizerId}:
    get:
      summary: Get meetings organized by user
      tags: [Meetings]
      operationId: getMeetingsByOrganizer
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: organizerId
          in: path
          description: Organizer user ID
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: Page number (0-indexed)
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Meetings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/MeetingResponse'
                  pageable:
                    $ref: '#/components/schemas/PageMetadata'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /meetings/participant/{participantId}:
    get:
      summary: Get meetings for participant
      tags: [Meetings]
      operationId: getMeetingsByParticipant
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: participantId
          in: path
          description: Participant user ID
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: Page number (0-indexed)
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: status
          in: query
          description: Filter by meeting status
          required: false
          schema:
            type: string
            enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED]
      responses:
        '200':
          description: Meetings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/MeetingResponse'
                  pageable:
                    $ref: '#/components/schemas/PageMetadata'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /meetings/{meetingId}/reminders:
    post:
      summary: Create meeting reminder
      tags: [Meeting Reminders]
      operationId: createReminder
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: meetingId
          in: path
          description: Meeting ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReminderRequest'
      responses:
        '201':
          description: Reminder created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

    get:
      summary: Get meeting reminders
      tags: [Meeting Reminders]
      operationId: getMeetingReminders
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: meetingId
          in: path
          description: Meeting ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reminders retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReminderResponse'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /meetings/upcoming:
    get:
      summary: Get upcoming meetings for user
      tags: [Meetings]
      operationId: getUpcomingMeetings
      parameters:
        - name: X-Tenant-ID
          in: header
          description: Tenant ID
          required: true
          schema:
            type: string
        - name: days
          in: query
          description: Number of days to look ahead
          required: false
          schema:
            type: integer
            default: 7
            minimum: 1
        - name: page
          in: query
          description: Page number (0-indexed)
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Upcoming meetings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/MeetingResponse'
                  pageable:
                    $ref: '#/components/schemas/PageMetadata'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

components:
  schemas:
    CreateMeetingRequest:
      type: object
      required:
        - title
        - startTime
        - organizerId
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: Meeting title
          example: "Q2 Planning Meeting"
        description:
          type: string
          maxLength: 2000
          description: Meeting description
          example: "Discuss Q2 goals and objectives"
        startTime:
          type: string
          format: date-time
          description: Meeting start time
          example: "2026-05-20T14:00:00+01:00"
        endTime:
          type: string
          format: date-time
          description: Meeting end time
          example: "2026-05-20T15:00:00+01:00"
        location:
          type: string
          maxLength: 255
          description: Physical meeting location
          example: "Conference Room A"
        meetingLink:
          type: string
          format: uri
          description: Virtual meeting link
          example: "https://meet.zimesfield.com/meeting/abc123"
        organizerId:
          type: string
          format: uuid
          description: Meeting organizer user ID
        participantIds:
          type: array
          items:
            type: string
            format: uuid
          description: Initial list of participant user IDs
        category:
          type: string
          description: Meeting category
          example: "Planning"
        priority:
          type: integer
          minimum: 0
          maximum: 10
          description: Priority level (0-10)
          example: 7
        recurring:
          type: boolean
          description: Whether this is a recurring meeting
          default: false
        recurrencePattern:
          type: string
          description: Recurrence pattern (e.g., WEEKLY, MONTHLY)
          example: "WEEKLY"

    UpdateMeetingRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: Updated meeting title
        description:
          type: string
          maxLength: 2000
          description: Updated meeting description
        startTime:
          type: string
          format: date-time
          description: Updated start time
        endTime:
          type: string
          format: date-time
          description: Updated end time
        location:
          type: string
          maxLength: 255
          description: Updated location
        meetingLink:
          type: string
          format: uri
          description: Updated meeting link
        category:
          type: string
          description: Updated category
        priority:
          type: integer
          minimum: 0
          maximum: 10
          description: Updated priority level

    EndMeetingRequest:
      type: object
      properties:
        notes:
          type: string
          maxLength: 2000
          description: Meeting notes or summary
          example: "Discussed Q2 goals, assigned action items"
        recordingUrl:
          type: string
          format: uri
          description: Meeting recording URL
          example: "https://recordings.zimesfield.com/meeting/abc123"

    CancelMeetingRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
          description: Cancellation reason
          example: "Organizer is unavailable"
        notifyParticipants:
          type: boolean
          description: Whether to notify all participants
          default: true

    AddParticipantRequest:
      type: object
      required:
        - participantId
      properties:
        participantId:
          type: string
          format: uuid
          description: User ID of participant to add
        role:
          type: string
          enum: [ATTENDEE, PRESENTER, OBSERVER]
          description: Participant role
          default: ATTENDEE

    UpdateParticipantStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ACCEPTED, DECLINED, TENTATIVE, NO_RESPONSE]
          description: Participant RSVP status

    CreateReminderRequest:
      type: object
      required:
        - minutesBefore
      properties:
        minutesBefore:
          type: integer
          minimum: 1
          description: Number of minutes before meeting to send reminder
          example: 15
        type:
          type: string
          enum: [EMAIL, SMS, IN_APP]
          description: Reminder notification type
          default: IN_APP

    MeetingResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Meeting ID
        tenantId:
          type: string
          description: Tenant ID
        title:
          type: string
          description: Meeting title
        description:
          type: string
          description: Meeting description
        status:
          type: string
          enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED]
          description: Current status of the meeting
        startTime:
          type: string
          format: date-time
          description: Meeting start time
        endTime:
          type: string
          format: date-time
          description: Meeting end time
        location:
          type: string
          description: Physical meeting location
        meetingLink:
          type: string
          format: uri
          description: Virtual meeting link
        organizerId:
          type: string
          format: uuid
          description: Meeting organizer user ID
        category:
          type: string
          description: Meeting category
        priority:
          type: integer
          description: Priority level (0-10)
        participantCount:
          type: integer
          description: Number of participants
        recurring:
          type: boolean
          description: Whether this is a recurring meeting
        recurrencePattern:
          type: string
          description: Recurrence pattern
        notes:
          type: string
          description: Meeting notes
        recordingUrl:
          type: string
          format: uri
          description: Meeting recording URL
        cancellationReason:
          type: string
          description: Reason for cancellation (if cancelled)
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        completedAt:
          type: string
          format: date-time
          description: Completion timestamp

    ParticipantResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Participant ID (User ID)
        name:
          type: string
          description: Participant name
        email:
          type: string
          format: email
          description: Participant email
        role:
          type: string
          enum: [ATTENDEE, PRESENTER, OBSERVER]
          description: Participant role
        status:
          type: string
          enum: [ACCEPTED, DECLINED, TENTATIVE, NO_RESPONSE]
          description: RSVP status
        joinTime:
          type: string
          format: date-time
          description: When participant joined the meeting
        leaveTime:
          type: string
          format: date-time
          description: When participant left the meeting
        duration:
          type: integer
          description: Duration in minutes
        addedAt:
          type: string
          format: date-time
          description: When participant was added to meeting

    ReminderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Reminder ID
        meetingId:
          type: string
          format: uuid
          description: Meeting ID
        minutesBefore:
          type: integer
          description: Minutes before meeting
        type:
          type: string
          enum: [EMAIL, SMS, IN_APP]
          description: Reminder notification type
        sent:
          type: boolean
          description: Whether reminder was sent
        sentAt:
