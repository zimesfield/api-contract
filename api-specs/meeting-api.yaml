openapi: 3.0.3
info:
  title: Meeting API
  description: REST API for managing meetings in the Zimesfield platform
  version: 1.0.0
  contact:
    name: Zimesfield Team
servers:
  - url: 'http://localhost:8083/api'
    description: Local development server
  - url: 'https://api.zimesfield.com/api'
    description: Production server

tags:
  - name: Meetings
    description: Meeting management operations

paths:
  /meetings:
    $ref: './paths/meeting/create-meeting.yaml'

  /meetings/{meetingId}:
    $ref: './paths/meeting/get-update-delete-meeting.yaml'

  /meetings/{meetingId}/start:
    $ref: './paths/meeting/start.yaml'

  /meetings/{meetingId}/end:
    $ref: './paths/meeting/end.yaml'

  /meetings/{meetingId}/cancel:
    $ref: './paths/meeting/cancel.yaml'

  /meetings/{meetingId}/participants:
    $ref: './paths/meeting/participants.yaml'

  /meetings/{meetingId}/participants/{participantId}:
    $ref: './paths/meeting/participant-update.yaml'

  /meetings/organizer/{organizerId}:
    $ref: './paths/meeting/organizer.yaml'

  /meetings/participant/{participantId}:
    $ref: './paths/meeting/participant.yaml'

  /meetings/{meetingId}/reminders:
    $ref: './paths/meeting/reminders.yaml'

  /meetings/upcoming:
    $ref: './paths/meeting/upcoming.yaml'

components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth2 with Keycloak
      flows:
        authorizationCode:
          authorizationUrl: http://localhost:9080/realms/zimesfield/protocol/openid-connect/auth
          tokenUrl: http://localhost:9080/realms/zimesfield/protocol/openid-connect/token
          scopes:
            openid: Zimesfeld specific claims
            email: Email claims
            profile: Profile claims
    openId:
      type: openIdConnect
      openIdConnectUrl: http://localhost:9080/realms/zimesfield/.well-known/openid-configuration
