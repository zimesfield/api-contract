openapi: 3.0.3
info:
  title: Tenant Registration API
  version: 1.1.0
  description: API for registering tenants, validating input, verifying token, and sending notifications in a multi-tenant system.

servers:
  - url: '{protocol}://{environment}/{version}/api/{service}'
    variables:
      protocol:
        enum:
          - http
          - https
        default: http
      version:
        enum:
          - v1
        default: v1
      service:
        enum:
          - tenants
        default: tenants
      environment:
        default: localhost:8081    # Local server
        enum:
          - localhost:8081
          - api.profilenest.com         # Production server
          - dev.api.profilenest.com     # Development server
          - staging.api.profilenest.com # Staging server

tags:
  - name: Register
    description: Tenant registration
  - name: Tenant
    description: Tenant management

security:
  - oauth: [ ]

paths:
  /init/signup:
    $ref: './paths/tenant/signup-init.yaml'

  /finish/signup:
    $ref: './paths/tenant/signup-finish.yaml'

  /tenants/{uuid}:
    $ref: './paths/tenant/tenant-info.yaml'

  /tenants/{uuid}/email:
    $ref: './paths/tenant/update-email.yaml'
